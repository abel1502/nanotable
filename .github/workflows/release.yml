name: release

on:
  release:
    types: [published]

jobs:
  validate:
    name: Validate and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Verify release metadata matches package version
        run: |
          set -euo pipefail
          VERSION="$(uvx hatch version)"
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"

          test "$TAG" = "$VERSION"
          test "$NAME" = "$VERSION"

      - name: Test
        run: uvx hatch test -py 3.13,3.14

      - name: Type-check
        run: uvx hatch run type:check

  publish:
    name: Build and publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Build distributions
        run: uv build --no-sources

      - name: Upload wheels to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.whl --clobber

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
